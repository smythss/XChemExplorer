name: Code CI

on:
  push:
    branches:
      - master
    tags:
      - "*"
  pull_request:

jobs:
  lint:
    runs-on: "ubuntu-latest"
    container:
      image: rockylinux:9
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install pip3
        run: |
          dnf update -y
          dnf install -y python3-pip

      - name: Install linters
        run: |
          pip3 install flake8
          pip3 install black[python2]

      - name: Lint with flake8
        run: |
          flake8 .

      - name: Lint with black
        run: |
          black --check .
